services:
  versitygw:
    image: versity/versitygw:latest
    environment:
      ROOT_ACCESS_KEY: access
      ROOT_SECRET_KEY: secretsecret
      VGW_BACKEND: posix
      VGW_BACKEND_ARG: /var/lib
    ports:
      - "${VERSITYGW_PORT:-7070}:7070"
    volumes:
      - versitygw:/var/lib

  versitygw-test:
    image: versity/versitygw:latest
    environment:
      ROOT_ACCESS_KEY: access
      ROOT_SECRET_KEY: secretsecret
      VGW_BACKEND: posix
      VGW_BACKEND_ARG: /var/lib
    ports:
      - "${VERSITYGW_TEST_PORT:-7072}:7070"

volumes:
  versitygw:
